name: update free keys1111

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Generate Lootlabs link
        env:
          LOOTLABS_API_TOKEN: ${{ secrets.LOOTLABS_API_TOKEN }}
        run: python .github/workflows/generate_lootlabs_link.py TEST_KEY
